# ============================================================
# VaultMind SDK — Decision Governance Policy (CHP gate)
# Ported from the CleanMandate / SwarmFi-Executor CHP pattern.
# Notional units are the vault's accounting unit (USD-equivalent).
# If this file is missing or unparseable, the gate falls back to a
# conservative built-in default and logs a warning (src/chp/policy.ts).
# ============================================================
version: "1.0"

# Hard ceiling on a single allocation/withdrawal notional. Above => BLOCKED.
max_notional_usd: 10000.0

# Cumulative notional allowed per rolling day.
daily_notional_cap_usd: 50000.0

# Human-in-the-loop threshold. At or above this notional the action
# requires explicit human approval before it can LOCK.
hitl_threshold_usd: 3000.0

# Vault actions the agent is permitted to take.
allowed_actions:
  - buy
  - sell
  - rebalance

# Per-token notional caps. Tokens omitted here fall back to
# max_notional_usd. A token mapped to 0 is effectively blocked.
per_asset_limits:
  SUI: 8000.0
  USDC: 10000.0

# Minimum signal confidence (0..1) for an action to pass the
# adversarial sanity check.
min_confidence: 0.55
